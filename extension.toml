id = "kittyprotocol"
name = "KittyProtocol"
version = "1.0.0"
description = "PCAP protocol analysis and investigation UI for KittySploit"
author = "KittySploit Team"

extension_type = "UI"
entry_point = "src/main.py"

[compatibility]
kittysploit_min = "1.0.0"

[permissions]
network_access = true
database_access = false
sandbox_level = "standard"
allowed_imports = ["flask", "flask_cors", "flask_socketio"]
blocked_imports = []
hooks = []
events = []
middlewares = []

[metadata]
price = 0.0
currency = "EUR"
license = "MIT"
repository = "https://github.com/SIA-IOTechnology/KittyProtocol"
